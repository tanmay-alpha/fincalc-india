services:
  - type: web
    name: fincalc-india
    env: node
    region: singapore   # closest to India
    plan: free
    buildCommand: |
      npm install &&
      npx prisma generate &&
      npx prisma migrate deploy &&
      npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXTAUTH_URL
        value: https://fincalc-india.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: fincalc-db
          property: connectionString
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false

databases:
  - name: fincalc-db
    databaseName: fincalc_prod
    user: fincalc_user
    region: singapore
    plan: free
